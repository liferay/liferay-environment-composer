jobs:
    test-e2e-basic:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
                with:
                    submodules: true
            -   uses: actions/setup-java@v4
                with:
                    distribution: zulu
                    java-version: "21"
            -   run: export BATS_FILE_EXTENSION="test.sh" && ./scripts/vendor/bats/bin/bats ./scripts/tests/test-e2e-basic.test.sh
name: Test e2e basic
on:
    pull_request:
        branches: [master]