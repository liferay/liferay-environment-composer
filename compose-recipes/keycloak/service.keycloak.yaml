services:
    keycloak:
        build:
            args:
                LIFERAY_PORT: ${LIFERAY_PORT}
            context: ./compose-recipes/keycloak
        container_name: ${NAMESPACE}-keycloak
        deploy:
            resources:
                limits:
                    memory: 1G
                reservations:
                    memory: 1G
        environment:
            -   KC_BOOTSTRAP_ADMIN_USERNAME=admin
            -   KC_BOOTSTRAP_ADMIN_PASSWORD=admin
            -   KEYCLOAK_HOSTNAME=localhost
            -   KEYCLOAK_PORT=${KEYCLOAK_PORT}
        healthcheck:
            interval: 10s
            retries: 3
            start_period: 30s
            test: ["CMD-SHELL", "exec 3<> /dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
            timeout: 5s
        ports:
            -   ${KEYCLOAK_PORT}:${KEYCLOAK_PORT}
        volumes:
            -   keycloak:/opt/keycloak/data/h2
volumes:
    keycloak: